</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Data mesh — decentralized, domain-owned data products</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Each domain owns its data as a product; the platform and governance make them interoperable</text><rect x="60" y="70" width="1060" height="50" fill="#f4f3f0" stroke="#9a9a9a" stroke-width="1.5" rx="6"/><text x="590" y="92" font-size="13" fill="#4a4a4a" text-anchor="middle" font-weight="700">Federated computational governance</text><text x="590" y="110" font-size="10.5" fill="#666666" text-anchor="middle" font-style="italic">standards enforced by the platform, automatically</text><rect x="170" y="140" width="250" height="150" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="295" y="164" font-size="13" fill="#a8331f" text-anchor="middle" font-weight="700">Orders domain</text><text x="295" y="184" font-size="10.5" fill="#3a3a3a" text-anchor="middle">order lifecycle data</text><text x="295" y="204" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">owns its data</text><rect x="184" y="220" width="64" height="22" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="216" y="235" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">REST</text><rect x="258" y="220" width="64" height="22" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="290" y="235" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">gRPC</text><rect x="332" y="220" width="74" height="22" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="369" y="235" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">Events</text><text x="295" y="276" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">team-owned</text><rect x="650" y="140" width="250" height="150" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="775" y="164" font-size="13" fill="#a8331f" text-anchor="middle" font-weight="700">Inventory domain</text><text x="775" y="184" font-size="10.5" fill="#3a3a3a" text-anchor="middle">stock levels + catalog</text><text x="775" y="204" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">owns its data</text><rect x="664" y="220" width="64" height="22" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="696" y="235" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">REST</text><rect x="738" y="220" width="64" height="22" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="770" y="235" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">gRPC</text><rect x="812" y="220" width="74" height="22" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="13"/><text x="849" y="235" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">Events</text><text x="775" y="276" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">team-owned</text><rect x="170" y="310" width="250" height="150" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="295" y="334" font-size="13" fill="#a8331f" text-anchor="middle" font-weight="700">Payment domain</text><text x="295" y="354" font-size="10.5" fill="#3a3a3a" text-anchor="middle">transactions + ledger</text><text x="295" y="374" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">owns its data</text><rect x="184" y="390" width="64" height="22" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="13"/><text x="216" y="405" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">REST</text><rect x="258" y="390" width="64" height="22" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="13"/><text x="290" y="405" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">gRPC</text><rect x="332" y="390" width="74" height="22" fill="#fbe8d8" stroke="#c97a3a" stroke-