<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="520" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Data lake — accept everything, sort it out later</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Schema-on-read, zone-based, format-agnostic — flexible until it becomes a swamp</text><rect x="50" y="82" width="140" height="50" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="112" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">Structured</text><rect x="50" y="142" width="140" height="50" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="172" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">Semi-structured</text><rect x="50" y="202" width="140" height="50" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="232" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">Unstructured</text><rect x="50" y="262" width="140" height="50" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="292" font-size="11.5" fill="#1a3a6a" text-anchor="middle" font-weight="700">Streaming</text><rect x="340" y="78" width="360" height="220" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="520" y="100" font-size="15" fill="#2a5a1a" text-anchor="middle" font-weight="700">Data Lake</text><rect x="356" y="116" width="328" height="48" fill="#d4e8c6" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="372" y="140" font-size="12" fill="#2a5a1a" text-anchor="start" font-weight="700">Raw / Landing zone</text><text x="668" y="140" font-size="10" fill="#4a6a3a" text-anchor="end" font-style="italic">ingest as-is</text><rect x="356" y="174" width="328" height="48" fill="#c5ddb6" stroke="#4a7a2a" stroke-width="1.5" rx="6"/><text x="372" y="198" font-size="12" fill="#2a5a1a" text-anchor="start" font-weight="700">Curated zone</text><text x="668" y="198" font-size="10" fill="#4a6a3a" text-anchor="end" font-style="italic">cleaned, typed</text><rect x="356" y="232" width="328" height="48" fill="#b6d2a6" stroke="#3a6a1a" stroke-width="1.5" rx="6"/><text x="372" y="256" font-size="12" fill="#2a5a1a" text-anchor="start" font-weight="700">Refined zone</text><text x="668" y="256" font-size="10" fill="#4a6a3a" text-anchor="end" font-style="italic">modeled, ready</text><rect x="850" y="82" width="150" height="50" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="925" y="112" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">Analytics</text><rect x="850" y="142" width="150" height="50" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="925" y="172" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">ML / AI</text><rect x="850" y="202" width="150" height="50" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="925" y="232" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">Reporting</text><rect x="850" y="262" width="150" height="50" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="925" y="292" font-size="11.5" fill="#7a3a0a" text-anchor="middle" font-weight="700">Ad-hoc queries</text><line x1="194" y1="107" x2="336" y2="188" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="194" y1="167" x2="336" y2="188" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="194" y1="227" x2="336" y2="188" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="194" y1="287" x2="336" y2="188" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="704" y1="188" x2="846" y2="107" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><line x1="704" y1="188" x2="846" y2="167" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><line x1="704" y1="188" x2="846" y2="227" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><line x1="704" y1="188" x2="846" y2="287" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><rect x="60" y="340" width="1060" height="100" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="80" y="368" font-size="13" fill="#a8331f" text-anchor="start" font-weight="700">Without governance, the lake becomes a swamp</text><text x="80" y="392" font-size="11" fill="#3a3a3a" text-anchor="start">Data lands in the raw zone and never moves — nobody knows what it is or whether it's still valid.</text><text x="80" y="410" font-size="11" fill="#3a3a3a" text-anchor="start">A central team still owns the bucket; the organizational bottleneck is unchanged.</text><text x="80" y="428" font-size="11" fill="#3a3a3a" text-anchor="start">Schema-on-read means consumers discover structure at query time — if they can find the data at all.</text><text x="590" y="504" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Accept everything, sort it out later — but sorting it out still requires the same central team.</text></svg>