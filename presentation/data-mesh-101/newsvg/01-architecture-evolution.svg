<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">The evolution of data architecture</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Each pattern solved the problem the previous one left behind</text><rect x="70" y="70" width="220" height="300" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="180" y="98" font-size="14" fill="#1a3a6a" text-anchor="middle" font-weight="700">Data Pipelines</text><text x="180" y="116" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">1990s –</text><text x="86" y="148" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">PROBLEM SOLVED</text><rect x="84" y="156" width="192" height="56" fill="#ffffff" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="180" y="178" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">Moving data</text><text x="180" y="196" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">from A to B</text><text x="86" y="232" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">LIMITATION</text><rect x="84" y="240" width="192" height="56" fill="#ffffff" stroke="#2c5aa0" stroke-width="1.5" rx="6" stroke-dasharray="4 3"/><text x="180" y="262" font-size="11.5" fill="#3a3a3a" text-anchor="middle">Pipeline sprawl;</text><text x="180" y="279" font-size="11.5" fill="#3a3a3a" text-anchor="middle">no ownership</text><text x="180" y="350" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">Point-to-point</text><line x1="294" y1="220" x2="316" y2="220" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/><rect x="320" y="70" width="220" height="300" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="430" y="98" font-size="14" fill="#7a3a0a" text-anchor="middle" font-weight="700">Data Warehouse</text><text x="430" y="116" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">2000s –</text><text x="336" y="148" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">PROBLEM SOLVED</text><rect x="334" y="156" width="192" height="56" fill="#ffffff" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="430" y="178" font-size="12" fill="#7a3a0a" text-anchor="middle" font-weight="700">Single source</text><text x="430" y="196" font-size="12" fill="#7a3a0a" text-anchor="middle" font-weight="700">of truth</text><text x="336" y="232" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">LIMITATION</text><rect x="334" y="240" width="192" height="56" fill="#ffffff" stroke="#c97a3a" stroke-width="1.5" rx="6" stroke-dasharray="4 3"/><text x="430" y="262" font-size="11.5" fill="#3a3a3a" text-anchor="middle">Central team</text><text x="430" y="279" font-size="11.5" fill="#3a3a3a" text-anchor="middle">bottleneck</text><text x="430" y="350" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">Hub-and-spoke</text><line x1="544" y1="220" x2="566" y2="220" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/><rect x="570" y="70" width="220" height="300" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="680" y="98" font-size="14" fill="#2a5a1a" text-anchor="middle" font-weight="700">Data Lake</text><text x="680" y="116" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">2010s –</text><text x="586" y="148" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">PROBLEM SOLVED</text><rect x="584" y="156" width="192" height="56" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="680" y="178" font-size="12" fill="#2a5a1a" text-anchor="middle" font-weight="700">Format flexibility</text><text x="680" y="196" font-size="12" fill="#2a5a1a" text-anchor="middle" font-weight="700">at scale</text><text x="586" y="232" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">LIMITATION</text><rect x="584" y="240" width="192" height="56" fill="#ffffff" stroke="#5a8a3a" stroke-width="1.5" rx="6" stroke-dasharray="4 3"/><text x="680" y="262" font-size="11.5" fill="#3a3a3a" text-anchor="middle">Swamp risk;</text><text x="680" y="279" font-size="11.5" fill="#3a3a3a" text-anchor="middle">same bottleneck</text><text x="680" y="350" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">Zone-based</text><line x1="794" y1="220" x2="816" y2="220" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/><rect x="820" y="70" width="220" height="300" fill="#fdf0ec" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="930" y="98" font-size="14" fill="#a8331f" text-anchor="middle" font-weight="700">Data Mesh</text><text x="930" y="116" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">2019 –</text><text x="836" y="148" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">PROBLEM SOLVED</text><rect x="834" y="156" width="192" height="56" fill="#ffffff" stroke="#c14a3a" stroke-width="1.5" rx="6"/><text x="930" y="178" font-size="12" fill="#a8331f" text-anchor="middle" font-weight="700">Organizational</text><text x="930" y="196" font-size="12" fill="#a8331f" text-anchor="middle" font-weight="700">scaling</text><text x="836" y="232" font-size="9" fill="#8a7a5a" text-anchor="start" font-weight="600">LIMITATION</text><rect x="834" y="240" width="192" height="56" fill="#ffffff" stroke="#c14a3a" stroke-width="1.5" rx="6" stroke-dasharray="4 3"/><text x="930" y="262" font-size="11.5" fill="#3a3a3a" text-anchor="middle">Requires</text><text x="930" y="279" font-size="11.5" fill="#3a3a3a" text-anchor="middle">maturity</text><text x="930" y="350" font-size="11" fill="#a8331f" text-anchor="middle" font-weight="700">Domain-owned</text><rect x="70" y="400" width="970" height="70" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="86" y="422" font-size="10" fill="#8a7a5a" text-anchor="start" font-weight="600">ORGANIZATIONAL DIMENSION</text><text x="180" y="448" font-size="11" fill="#1a3a6a" text-anchor="middle" font-weight="700">Point-to-point</text><line x1="240" y1="444" x2="370" y2="444" stroke="#5a5a5a" stroke-width="1.2" marker-end="url(#arr)"/><text x="430" y="448" font-size="11" fill="#7a3a0a" text-anchor="middle" font-weight="700">Centralized team</text><line x1="490" y1="444" x2="620" y2="444" stroke="#5a5a5a" stroke-width="1.2" marker-end="url(#arr)"/><text x="680" y="448" font-size="11" fill="#2a5a1a" text-anchor="middle" font-weight="700">Centralized team (bigger)</text><line x1="740" y1="444" x2="870" y2="444" stroke="#5a5a5a" stroke-width="1.2" marker-end="url(#arr)"/><text x="930" y="448" font-size="11" fill="#a8331f" text-anchor="middle" font-weight="700">Decentralized ownership</text><text x="590" y="544" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Each pattern solved the problem the previous one left; the mesh solves the organizational scaling problem they all share.</text></svg>