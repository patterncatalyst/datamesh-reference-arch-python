<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="560" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Data pipelines — bespoke point-to-point movement</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Extract-Transform-Load: move data from A to B, one pairing at a time</text><rect x="60" y="88" width="120" height="56" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="121" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">CRM</text><rect x="60" y="156" width="120" height="56" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="189" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">ERP</text><rect x="60" y="224" width="120" height="56" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="257" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">Logs</text><rect x="60" y="292" width="120" height="56" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="120" y="325" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">Events</text><rect x="340" y="120" width="280" height="100" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="480" y="150" font-size="14" fill="#1a3a6a" text-anchor="middle" font-weight="700">ETL Pipeline</text><text x="480" y="178" font-size="13" fill="#3a3a3a" text-anchor="middle">Extract  →  Transform  →  Load</text><text x="480" y="200" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">one bespoke pipeline per pairing</text><rect x="780" y="110" width="200" height="65" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="880" y="135" font-size="12" fill="#7a3a0a" text-anchor="middle" font-weight="700">Data Warehouse</text><text x="880" y="155" font-size="10" fill="#3a3a3a" text-anchor="middle">structured, queryable</text><rect x="780" y="195" width="200" height="65" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="880" y="220" font-size="12" fill="#7a3a0a" text-anchor="middle" font-weight="700">Dashboard / BI</text><text x="880" y="240" font-size="10" fill="#3a3a3a" text-anchor="middle">visual analytics</text><line x1="184" y1="116" x2="336" y2="170" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="184" y1="184" x2="336" y2="170" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="184" y1="252" x2="336" y2="170" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="184" y1="320" x2="336" y2="170" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="624" y1="150" x2="776" y2="142" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><line x1="624" y1="190" x2="776" y2="228" stroke="#5a5a5a" stroke-width="1.4" marker-end="url(#arr)"/><rect x="60" y="380" width="1060" height="120" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="80" y="410" font-size="13" fill="#5a3a0a" text-anchor="start" font-weight="700">Pipeline sprawl — the n × m problem</text><text x="80" y="435" font-size="11" fill="#3a3a3a" text-anchor="start">Each source × destination pairing needs its own bespoke pipeline.</text><text x="80" y="453" font-size="11" fill="#3a3a3a" text-anchor="start">4 sources × 3 destinations = 12 pipelines; add one source and you add 3 more.</text><text x="80" y="471" font-size="11" fill="#3a3a3a" text-anchor="start">Ownership fragments; no single team can see the whole picture.</text><line x1="760" y1="395" x2="1080" y2="395" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="395" x2="1080" y2="425" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="395" x2="1080" y2="455" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="415" x2="1080" y2="395" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="415" x2="1080" y2="425" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="415" x2="1080" y2="455" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="435" x2="1080" y2="395" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="435" x2="1080" y2="425" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="435" x2="1080" y2="455" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="455" x2="1080" y2="395" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="455" x2="1080" y2="425" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><line x1="760" y1="455" x2="1080" y2="455" stroke="#5a5a5a" stroke-width="0.8" marker-end="url(#arr)" stroke-dasharray="4 3"/><text x="590" y="544" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">Each pipeline is bespoke; as sources and destinations multiply, the sprawl becomes the problem.</text></svg>