<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Helvetica, -apple-system, 'Segoe UI', Roboto, sans-serif"><rect x="0" y="0" width="1180" height="520" fill="#ffffff"/><defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a5a5a"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c14a3a"/></marker>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/></marker>
<marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5a8a3a"/></marker>
</defs><text x="590" y="32" font-size="18" fill="#2a2a2a" text-anchor="middle" font-weight="700">Data warehouse — a single source of truth, one team to rule it all</text><text x="590" y="51" font-size="12" fill="#666666" text-anchor="middle" font-style="italic">Schema-on-write, star schemas, dimensional models — everything funneled through a central gate</text><rect x="60" y="82" width="130" height="52" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="125" y="113" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">CRM</text><rect x="60" y="144" width="130" height="52" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="125" y="175" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">ERP</text><rect x="60" y="206" width="130" height="52" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="125" y="237" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">Logs</text><rect x="60" y="268" width="130" height="52" fill="#e8eef7" stroke="#2c5aa0" stroke-width="1.5" rx="6"/><text x="125" y="299" font-size="12" fill="#1a3a6a" text-anchor="middle" font-weight="700">Events</text><rect x="340" y="82" width="340" height="200" fill="#fbe8d8" stroke="#c97a3a" stroke-width="1.5" rx="6"/><text x="510" y="112" font-size="14" fill="#7a3a0a" text-anchor="middle" font-weight="700">Centralized Data Warehouse</text><text x="370" y="144" font-size="11" fill="#3a3a3a" text-anchor="start">Schema-on-write</text><text x="370" y="162" font-size="11" fill="#3a3a3a" text-anchor="start">Star schemas / snowflake</text><text x="370" y="180" font-size="11" fill="#3a3a3a" text-anchor="start">Dimensional models</text><text x="370" y="198" font-size="11" fill="#3a3a3a" text-anchor="start">Governed, structured, slow to change</text><text x="510" y="242" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">everything lands here first</text><text x="510" y="262" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">and is modeled by one team</text><rect x="840" y="95" width="150" height="52" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="915" y="126" font-size="12" fill="#2a5a1a" text-anchor="middle" font-weight="700">BI Dashboards</text><rect x="840" y="157" width="150" height="52" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="915" y="188" font-size="12" fill="#2a5a1a" text-anchor="middle" font-weight="700">Reports</text><rect x="840" y="219" width="150" height="52" fill="#e8f0e0" stroke="#5a8a3a" stroke-width="1.5" rx="6"/><text x="915" y="250" font-size="12" fill="#2a5a1a" text-anchor="middle" font-weight="700">Analysts</text><line x1="194" y1="108" x2="336" y2="182" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="194" y1="170" x2="336" y2="182" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="194" y1="232" x2="336" y2="182" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="194" y1="294" x2="336" y2="182" stroke="#2c5aa0" stroke-width="1.4" marker-end="url(#arrB)"/><line x1="684" y1="182" x2="836" y2="121" stroke="#5a8a3a" stroke-width="1.4" marker-end="url(#arrG)"/><line x1="684" y1="182" x2="836" y2="183" stroke="#5a8a3a" stroke-width="1.4" marker-end="url(#arrG)"/><line x1="684" y1="182" x2="836" y2="245" stroke="#5a8a3a" stroke-width="1.4" marker-end="url(#arrG)"/><rect x="300" y="340" width="580" height="100" fill="#f5edd6" stroke="#c19a6b" stroke-width="1.5" rx="6"/><text x="590" y="368" font-size="14" fill="#5a3a0a" text-anchor="middle" font-weight="700">Central Data Team</text><text x="330" y="392" font-size="11" fill="#3a3a3a" text-anchor="start">Owns all the data, understands none of the domains.</text><text x="330" y="410" font-size="11" fill="#3a3a3a" text-anchor="start">Every schema change, every new data source, every question funnels here.</text><text x="330" y="428" font-size="11" fill="#3a3a3a" text-anchor="start">The bottleneck a mesh exists to remove.</text><line x1="530" y1="340" x2="470" y2="286" stroke="#5a5a5a" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5 3"/><line x1="650" y1="340" x2="550" y2="286" stroke="#5a5a5a" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5 3"/><text x="590" y="330" font-size="10" fill="#666666" text-anchor="middle" font-style="italic">bottleneck</text><text x="590" y="504" font-size="12" fill="#6a5a3a" text-anchor="middle" font-style="italic">One team owns all the data but understands none of the domains — the bottleneck a mesh exists to remove.</text></svg>