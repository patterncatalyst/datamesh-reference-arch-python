# inventory-service — Quarkus config.
#
# Env-var overrides (PG_*, SERVICE_SCHEMA, OTLP_ENDPOINT) keep the Helm
# deployment contract identical to the Python tree: the CloudNativePG app
# Secret is surfaced as PG_HOST/PG_PORT/PG_DATABASE/PG_USER/PG_PASSWORD, and
# the per-service schema as SERVICE_SCHEMA (CAP-003).

quarkus.application.name=inventory-service
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# gRPC server on :50051 as its own server (not multiplexed on the HTTP port),
# so the wire contract `inventory-service:50051` matches the Python service.
quarkus.grpc.server.use-separate-server=true
quarkus.grpc.server.port=50051
quarkus.grpc.server.host=0.0.0.0

# Datasource: reactive client for runtime queries + JDBC for Flyway migrations.
# Connection details are set only in prod (in-cluster, from the CNPG app
# Secret). In dev/test they are left unset so Quarkus Dev Services starts a
# throwaway Postgres (Testcontainers) automatically.
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${PG_USER:capstone_app}
%prod.quarkus.datasource.password=${PG_PASSWORD:changeme}
%prod.quarkus.datasource.reactive.url=postgresql://${PG_HOST:127.0.0.1}:${PG_PORT:5432}/${PG_DATABASE:capstone}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${PG_HOST:127.0.0.1}:${PG_PORT:5432}/${PG_DATABASE:capstone}

# Per-service schema ownership. Flyway creates + owns it; Hibernate only maps.
quarkus.hibernate-orm.database.default-schema=${SERVICE_SCHEMA:inventory}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.create-schemas=true
quarkus.flyway.schemas=${SERVICE_SCHEMA:inventory}

# JSON wire-format parity with the Python services (snake_case fields).
quarkus.jackson.property-naming-strategy=SNAKE_CASE

# Observability the Python tree lacks: native OTLP traces to the shared
# collector/Tempo and Prometheus metrics at /q/metrics.
quarkus.otel.service.name=inventory-service
quarkus.otel.exporter.otlp.endpoint=http://${OTLP_ENDPOINT:localhost:4317}

# Tests run against Dev Services (Testcontainers Postgres); no live collector.
%test.quarkus.otel.sdk.disabled=true
%dev.quarkus.otel.sdk.disabled=true
