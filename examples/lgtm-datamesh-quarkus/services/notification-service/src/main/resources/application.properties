# notification-service — Quarkus config.
#
# Env-var overrides keep the Helm contract close to the Python tree: PG_*,
# SERVICE_SCHEMA, KAFKA_BOOTSTRAP, KAFKA_ORDER_TOPIC, KAFKA_GROUP, APICURIO_URL.

quarkus.application.name=notification-service
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Reactive Postgres runtime + JDBC for Flyway (which owns the schema/table).
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${PG_USER:capstone_app}
%prod.quarkus.datasource.password=${PG_PASSWORD:changeme}
%prod.quarkus.datasource.reactive.url=postgresql://${PG_HOST:127.0.0.1}:${PG_PORT:5432}/${PG_DATABASE:capstone}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${PG_HOST:127.0.0.1}:${PG_PORT:5432}/${PG_DATABASE:capstone}
quarkus.hibernate-orm.database.default-schema=${SERVICE_SCHEMA:notifications}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.create-schemas=true
quarkus.flyway.schemas=${SERVICE_SCHEMA:notifications}

# Kafka consumer: order.placed decoded as registered Avro via Apicurio. The
# writer schema is fetched by the id framed into each message; specific-avro
# maps it to the generated capstone.order.v1.OrderPlaced class.
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}
mp.messaging.incoming.order-placed.connector=smallrye-kafka
mp.messaging.incoming.order-placed.topic=${KAFKA_ORDER_TOPIC:order-placed}
mp.messaging.incoming.order-placed.group.id=${KAFKA_GROUP:notification-service}
mp.messaging.incoming.order-placed.auto.offset.reset=earliest
mp.messaging.incoming.order-placed.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-placed.value.deserializer=io.apicurio.registry.serde.avro.AvroKafkaDeserializer
mp.messaging.incoming.order-placed.apicurio.registry.url=${APICURIO_URL:http://localhost:8080}/apis/registry/v2
mp.messaging.incoming.order-placed.apicurio.registry.use-specific-avro-reader=true

# JSON wire-format parity with the Python services (snake_case fields).
quarkus.jackson.property-naming-strategy=SNAKE_CASE

# Observability the Python tree lacks: OTLP traces + Prometheus /q/metrics.
quarkus.otel.service.name=notification-service
quarkus.otel.exporter.otlp.endpoint=http://${OTLP_ENDPOINT:localhost:4317}
%test.quarkus.otel.sdk.disabled=true
%dev.quarkus.otel.sdk.disabled=true
