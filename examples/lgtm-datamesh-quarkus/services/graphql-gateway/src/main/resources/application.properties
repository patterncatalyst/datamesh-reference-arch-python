# graphql-gateway — Quarkus config. Stateless; no datasource.
#
# Env-var overrides keep the Helm contract close to the Python tree:
# ORDER_REST_URL and the inventory gRPC target.

quarkus.application.name=graphql-gateway
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# order-service over REST.
quarkus.rest-client.order-api.url=${ORDER_REST_URL:http://order-service}

# inventory-service over gRPC.
quarkus.grpc.clients.inventory.host=${INVENTORY_GRPC_HOST:inventory-service}
quarkus.grpc.clients.inventory.port=${INVENTORY_GRPC_PORT:50051}

# Serve the GraphQL UI and the SDL (/graphql/schema.graphql — the gateway's
# discovery contract, replacing the Python /sdl endpoint) in all profiles.
quarkus.smallrye-graphql.ui.always-include=true

# JSON parsing parity: order-service REST is snake_case; map it to the camelCase
# Order fields (SmallRye GraphQL then exposes them camelCase in the schema).
quarkus.jackson.property-naming-strategy=SNAKE_CASE

# Readiness deliberately does NOT probe downstreams (stateless gateway): there
# is no datasource/messaging health check to add, so /q/health/ready reflects
# "can I accept traffic", not "are my dependencies healthy".

# Observability the Python tree lacks: OTLP traces + Prometheus /q/metrics.
quarkus.otel.service.name=graphql-gateway
quarkus.otel.exporter.otlp.endpoint=http://${OTLP_ENDPOINT:localhost:4317}
%test.quarkus.otel.sdk.disabled=true
%dev.quarkus.otel.sdk.disabled=true
