# order-service — Quarkus config.
#
# Env-var overrides keep the Helm deployment contract close to the Python tree:
# PG_* (CNPG app Secret), SERVICE_SCHEMA, KAFKA_BOOTSTRAP, KAFKA_ORDER_TOPIC,
# APICURIO_URL, API_VERSION (canary). The gRPC client target is split into
# INVENTORY_GRPC_HOST/PORT (Quarkus configures host + port separately).

quarkus.application.name=order-service
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Reactive Postgres. Hibernate creates the service's schema + table on startup
# (the Quarkus analog of the Python metadata.create_all).
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${PG_USER:capstone_app}
%prod.quarkus.datasource.password=${PG_PASSWORD:changeme}
%prod.quarkus.datasource.reactive.url=postgresql://${PG_HOST:127.0.0.1}:${PG_PORT:5432}/${PG_DATABASE:capstone}
quarkus.hibernate-orm.database.default-schema=${SERVICE_SCHEMA:orders}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.database.generation.create-schemas=true

# gRPC client → inventory-service CheckStock (the one synchronous cross-service
# call in the order flow).
quarkus.grpc.clients.inventory.host=${INVENTORY_GRPC_HOST:inventory-service}
quarkus.grpc.clients.inventory.port=${INVENTORY_GRPC_PORT:50051}

# Kafka producer: order.placed published as Avro, registered in Apicurio. The
# Confluent-compatible 4-byte schema id is framed into each message; the
# consumer fetches the writer schema by id to decode (CAP-018/019).
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}
mp.messaging.outgoing.order-placed.connector=smallrye-kafka
mp.messaging.outgoing.order-placed.topic=${KAFKA_ORDER_TOPIC:order-placed}
mp.messaging.outgoing.order-placed.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.order-placed.value.serializer=io.apicurio.registry.serde.avro.AvroKafkaSerializer
mp.messaging.outgoing.order-placed.apicurio.registry.url=${APICURIO_URL:http://localhost:8080}/apis/registry/v2
mp.messaging.outgoing.order-placed.apicurio.registry.auto-register=true

# JSON wire-format parity with the Python services (snake_case fields).
quarkus.jackson.property-naming-strategy=SNAKE_CASE

# Observability the Python tree lacks: OTLP traces to the shared collector/Tempo
# and Prometheus metrics at /q/metrics.
quarkus.otel.service.name=order-service
quarkus.otel.exporter.otlp.endpoint=http://${OTLP_ENDPOINT:localhost:4317}
%test.quarkus.otel.sdk.disabled=true
%dev.quarkus.otel.sdk.disabled=true
