syntax = "proto3";

// Package mirrors the directory tree (capstone/inventory/v1) and namespaces
// the contract so it can't collide with other services' protos (CAP-R19-4).
package capstone.inventory.v1;

// Java codegen options (Quarkus tree only — ignored by the Python generator).
// java_multiple_files emits each message as a top-level class
// (capstone.inventory.v1.CheckStockRequest) rather than nesting them inside an
// outer wrapper class. See DRA-002.
option java_multiple_files = true;
option java_package = "capstone.inventory.v1";
option java_outer_classname = "InventoryProto";

// InventoryService answers stock questions for the order flow. r23 ships the
// single synchronous call order-service needs when placing an order; more
// RPCs are added as the inventory domain grows.
service InventoryService {
  // CheckStock reports whether a SKU currently has at least the requested
  // quantity on hand. This is the first real cross-service call in the mesh.
  rpc CheckStock(CheckStockRequest) returns (CheckStockResponse);
}

message CheckStockRequest {
  string sku = 1;
  int32 quantity = 2;
}

message CheckStockResponse {
  bool available = 1;
  int32 quantity_on_hand = 2;
}
